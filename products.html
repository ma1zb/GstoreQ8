<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>منتجاتنا - GstoreQ8</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="logoapp.jpg">
</head>
<body>
  <header>
    <img src="logo.png" alt="Gstore Logo" class="logo">
    <h1>GstoreQ8</h1>
    <nav>
      <a href="index.html">الرئيسية</a>
      <a href="products.html">المنتجات</a>
      <a href="cart.html">🛒السلة</a>
      <a href="about.html">حول</a>
      <a href="contact.html">تواصل معنا</a>
    </nav>
  </header>

  <main>
    <h2>منتجاتنا</h2>
    
    <!-- هنا ستُعرض المنتجات القادمة من قاعدة البيانات -->
    <div id="dynamic-products" class="products-container"></div>
  </main>

  <footer>
    &copy; 2025 GstoreQ8. جميع الحقوق محفوظة.
  </footer>

  <script>
async function loadProducts() {
  try {
    const response = await fetch('get_products.php');
    const products = await response.json();

    const container = document.querySelector('.products-container');
    container.innerHTML = ''; // مسح المحتوى القديم

    products.forEach(product => {
      const productDiv = document.createElement('div');
      productDiv.className = 'product';

      productDiv.innerHTML = `
        <img src="images/${product.Image}" alt="${product.Name}">
        <h3>${product.Name}</h3>
        <p>${product.Description}</p>
        <span class="price">JD${product.Price} :السعر</span><br>
        <button class="add-to-cart" data-name="${product.Name}" data-price="${product.Price}">🛒 إضافة إلى السلة</button>
      `;

      container.appendChild(productDiv);
    });

    // إعادة ربط أزرار "إضافة إلى السلة"
    const buttons = document.querySelectorAll('.add-to-cart');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const name = btn.dataset.name;
        const price = parseFloat(btn.dataset.price);
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const existing = cart.find(item => item.name === name);

        if (existing) {
          existing.quantity += 1;
        } else {
          cart.push({ name, price, quantity: 1 });
        }

        localStorage.setItem('cart', JSON.stringify(cart));
        alert('تمت إضافة المنتج إلى السلة!');
      });
    });

  } catch (error) {
    console.error('خطأ في تحميل المنتجات:', error);
  }
}

// استدعاء الدالة لتحميل المنتجات عند فتح الصفحة
loadProducts();
</script>

</body>
</html>
